name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sanity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: python -m py_compile dictate.py overlay.py overlay_mic_test.py test_e2e.py scripts/generate_app_icon.py

      - name: Validate shell scripts
        run: |
          bash -n setup.sh
          bash -n download-model.sh
          bash -n run-whisper-dictate-pl.command
          bash -n scripts/build_macos_dist.sh
